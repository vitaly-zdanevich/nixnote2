name: CI

on:
  push:
    branches:
      - master
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
      - develop
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing version tag to build and publish, for example v2.1.21'
        required: false
        type: string

permissions:
  contents: read

jobs:
  appimage:
    name: AppImage (${{ matrix.artifact_arch }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_arch: amd64
            appimage_arch: x86_64
            runner: ubuntu-24.04
          - artifact_arch: arm64
            appimage_arch: aarch64
            runner: ubuntu-24.04-arm

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag || github.ref }}

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get -y install git-core build-essential ccache \
            wget curl make pkg-config file \
            libboost-dev libboost-test-dev libboost-program-options-dev libevent-dev libcurl4-openssl-dev \
            libpoppler-qt6-dev libqt6sql6-sqlite libhunspell-dev libtidy-dev \
            qt6-base-dev qt6-base-dev-tools qt6-declarative-dev qt6-tools-dev-tools \
            qt6-webchannel-dev qt6-webengine-dev

      - name: Build project
        shell: bash
        run: |
          set -o pipefail
          export JOBS="$(nproc)"
          echo "Using JOBS=${JOBS}"

          if ./development/build-with-qmake.sh release clean /usr/lib browser 2>&1 | tee build-project.log; then
            exit 0
          fi

          status=${PIPESTATUS[0]}
          echo "::group::Build project failure tail"
          tail -n 200 build-project.log
          echo "::endgroup::"

          grep -E -i -C 3 'fatal error:|[^[:alnum:]_]error:|undefined reference|collect2:|ld:|make(\[[0-9]+\])?: \*\*\*' \
            build-project.log > build-project-error-summary.log || true
          if [ ! -s build-project-error-summary.log ]; then
            tail -n 60 build-project.log > build-project-error-summary.log
          fi

          cut -c 1-500 build-project-error-summary.log > build-project-error-annotation.log
          message=$(perl -0pe 's/%/%25/g; s/\r/%0D/g; s/\n/%0A/g' build-project-error-annotation.log)
          echo "::error title=Build project failed::${message}"
          exit "${status}"

      - name: Build and run tests
        env:
          QT_QPA_PLATFORM: offscreen
        shell: bash
        run: |
          set -o pipefail
          export JOBS="$(nproc)"
          echo "Using JOBS=${JOBS}"

          if {
            ./development/run-cli-smoke-tests.sh
            ./development/run-tests.sh release clean /usr/lib
          } 2>&1 | tee build-tests.log; then
            exit 0
          fi

          status=${PIPESTATUS[0]}
          echo "::group::Build and run tests failure tail"
          tail -n 200 build-tests.log
          echo "::endgroup::"

          grep -E -C 4 '^(FAIL!|   Actual|   Expected|   Loc:|Totals:)|DIFF r1:' \
            build-tests.log > build-tests-error-summary.log || true
          if [ ! -s build-tests-error-summary.log ]; then
            tail -n 80 build-tests.log > build-tests-error-summary.log
          fi

          cut -c 1-500 build-tests-error-summary.log > build-tests-error-annotation.log
          message=$(perl -0pe 's/%/%25/g; s/\r/%0D/g; s/\n/%0A/g' build-tests-error-annotation.log)
          echo "::error title=Build and run tests failed::${message}"
          exit "${status}"

      - name: Install AppImage tools
        shell: bash
        run: |
          set -euo pipefail

          install_appimage_tool() {
            local name="$1"
            local url="$2"

            curl --fail --location --retry 3 --output "${name}.AppImage" "${url}"
            chmod a+x "${name}.AppImage"
            "./${name}.AppImage" --appimage-extract
            mv squashfs-root "${name}"
            mv "${name}/AppRun" "${name}/${name}"
          }

          install_appimage_tool linuxdeploy \
            "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-${{ matrix.appimage_arch }}.AppImage"
          install_appimage_tool linuxdeploy-plugin-qt \
            "https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-${{ matrix.appimage_arch }}.AppImage"
          install_appimage_tool appimagetool \
            "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-${{ matrix.appimage_arch }}.AppImage"

      - name: Build AppImage
        shell: bash
        run: |
          set -euo pipefail

          export PATH="$PWD/linuxdeploy:$PWD/linuxdeploy-plugin-qt:$PWD/appimagetool:$PATH"
          export ARCH="${{ matrix.appimage_arch }}"

          linuxdeploy --desktop-file=./appdir/usr/share/applications/nixnote2.desktop --appdir=appdir --plugin qt

          if [ -d appdir/usr/lib ]; then
            find appdir/usr/lib -type f \( -name 'libnss3.so*' -o -name 'libnssutil3.so*' \) -delete
          fi

          appimagetool -n appdir

          version="$(cat appdir/usr/share/nixnote2/version.txt)"
          mkdir -p dist
          shopt -s nullglob
          appimages=(NixNote*.AppImage)
          if [ "${#appimages[@]}" -ne 1 ]; then
            echo "Expected exactly one AppImage, found ${#appimages[@]}"
            exit 1
          fi

          mv "${appimages[0]}" "dist/NixNote-${version}-${{ matrix.artifact_arch }}.AppImage"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: NixNote-${{ matrix.artifact_arch }}-AppImage
          path: dist/*.AppImage
          if-no-files-found: error

  release-appimages:
    name: Upload versioned AppImage release assets
    needs: appimage
    runs-on: ubuntu-24.04
    if: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '') }}
    permissions:
      contents: write

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag || github.ref }}

      - name: Download AppImage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: NixNote-*-AppImage
          path: dist
          merge-multiple: true

      - name: Prepare release notes
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"
          {
            echo "NixNote ${version}"
            echo
            if [ -f debian/changelog ]; then
              awk 'NF == 0 { exit } /^ -- / { next } { print }' debian/changelog
              echo
            fi

            echo "AppImage builds:"
            for appimage in dist/*.AppImage; do
              echo "- $(basename "${appimage}")"
            done
            echo
            echo "Built by GitHub Actions: ${RUN_URL}"
          } > release-notes.md

      - name: Upload AppImage release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
        run: |
          set -euo pipefail

          case "${RELEASE_TAG}" in
            v*) ;;
            *)
              echo "Release tag must start with v, got: ${RELEASE_TAG}"
              exit 1
              ;;
          esac

          version="${RELEASE_TAG#v}"
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" --title "NixNote ${version}" --notes-file release-notes.md
          else
            gh release create "${RELEASE_TAG}" --title "NixNote ${version}" --notes-file release-notes.md
          fi

          gh release upload "${RELEASE_TAG}" dist/*.AppImage --clobber
